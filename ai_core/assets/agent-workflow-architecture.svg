<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="580" viewBox="0 0 1060 580" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1060" height="580" fill="#F8FAFC" rx="12"/>

  <!-- 标题 -->
  <rect x="0" y="0" width="1060" height="46" fill="#1E293B" rx="12"/>
  <rect x="0" y="34" width="1060" height="12" fill="#1E293B"/>
  <text x="530" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="white">Any2table 多智能体架构</text>

  <!-- ═══════════ 输入层 ═══════════ -->
  <rect x="20" y="62" width="290" height="24" fill="#DBEAFE" rx="4"/>
  <text x="165" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">输 入 层</text>

  <!-- 用户要求 -->
  <rect x="20" y="90" width="86" height="52" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="63" y="111" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">用户要求</text>
  <text x="63" y="128" text-anchor="middle" font-size="10" fill="#64748B">.txt / .md</text>

  <!-- 源文档 -->
  <rect x="122" y="90" width="86" height="52" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="165" y="111" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">源文档</text>
  <text x="165" y="128" text-anchor="middle" font-size="10" fill="#64748B">.docx / .xlsx</text>

  <!-- 目标模板 -->
  <rect x="224" y="90" width="86" height="52" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="267" y="111" text-anchor="middle" font-size="11" font-weight="bold" fill="#1D4ED8">目标模板</text>
  <text x="267" y="128" text-anchor="middle" font-size="10" fill="#64748B">.docx / .xlsx</text>

  <!-- 输入 → 解析 箭头 -->
  <line x1="310" y1="116" x2="334" y2="116" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 解析层 -->
  <rect x="336" y="86" width="180" height="60" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="426" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803D">解析与规范化</text>
  <text x="426" y="122" text-anchor="middle" font-size="10" fill="#374151">DocxParser / XlsxParser</text>
  <text x="426" y="137" text-anchor="middle" font-size="10" fill="#374151">→ CanonicalDoc · TemplateSpec</text>

  <!-- 解析 → Agent链 箭头 -->
  <line x1="516" y1="116" x2="540" y2="116" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AgentState 底部条 -->
  <rect x="20" y="520" width="1020" height="42" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="530" y="537" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">共享状态 AgentState</text>
  <text x="530" y="554" text-anchor="middle" font-size="10" fill="#64748B">messages · logs · skill_runs · llm_runs · evidence_pack · records · fill_result</text>

  <!-- ═══════════ 7个Agent ═══════════ -->
  <!-- MasterAgent -->
  <rect x="542" y="86" width="118" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="601" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">MasterAgent</text>
  <text x="601" y="124" text-anchor="middle" font-size="10" fill="#374151">检查输入</text>
  <text x="601" y="138" text-anchor="middle" font-size="10" fill="#374151">规划路线</text>

  <!-- → -->
  <line x1="660" y1="116" x2="674" y2="116" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- TableAgent -->
  <rect x="676" y="86" width="118" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="735" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">TableAgent</text>
  <text x="735" y="124" text-anchor="middle" font-size="10" fill="#374151">解析模板</text>
  <text x="735" y="138" text-anchor="middle" font-size="10" fill="#374151">生成 TaskSpec</text>

  <!-- → -->
  <line x1="794" y1="116" x2="808" y2="116" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RouterAgent -->
  <rect x="810" y="86" width="118" height="60" rx="6" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="869" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#9A3412">RouterAgent</text>
  <text x="869" y="124" text-anchor="middle" font-size="10" fill="#374151">动态路由</text>
  <text x="869" y="138" text-anchor="middle" font-size="10" fill="#374151">direct / rag</text>

  <!-- → -->
  <line x1="928" y1="116" x2="942" y2="116" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RetrievalAgent -->
  <rect x="944" y="86" width="116" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="1002" y="108" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">RetrievalAgent</text>
  <text x="1002" y="124" text-anchor="middle" font-size="10" fill="#374151">全量扫描</text>
  <text x="1002" y="138" text-anchor="middle" font-size="10" fill="#374151">生成 EvidencePack</text>

  <!-- RetrievalAgent → RAGAgent (向下折回) -->
  <line x1="1002" y1="146" x2="1002" y2="170" stroke="#64748B" stroke-width="1.5"/>
  <line x1="1002" y1="170" x2="762" y2="170" stroke="#64748B" stroke-width="1.5"/>
  <line x1="762" y1="170" x2="762" y2="200" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════ 第二排 Agent ═══════════ -->
  <!-- RAGAgent -->
  <rect x="700" y="202" width="118" height="60" rx="6" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="759" y="224" text-anchor="middle" font-size="11" font-weight="bold" fill="#9A3412">RAGAgent</text>
  <text x="759" y="240" text-anchor="middle" font-size="10" fill="#374151">证据重排序</text>
  <text x="759" y="254" text-anchor="middle" font-size="10" fill="#374151">HybridRAG ★</text>

  <!-- → -->
  <line x1="700" y1="232" x2="686" y2="232" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CoderAgent -->
  <rect x="542" y="202" width="142" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="613" y="224" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">CoderAgent</text>
  <text x="613" y="240" text-anchor="middle" font-size="10" fill="#374151">规则提取 + Skill提取</text>
  <text x="613" y="254" text-anchor="middle" font-size="10" fill="#374151">候选合并 → 结构化记录</text>

  <!-- → -->
  <line x1="542" y1="232" x2="526" y2="232" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- VerifierAgent -->
  <rect x="380" y="202" width="140" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="450" y="224" text-anchor="middle" font-size="11" font-weight="bold" fill="#5B21B6">VerifierAgent</text>
  <text x="450" y="240" text-anchor="middle" font-size="10" fill="#374151">写回模板</text>
  <text x="450" y="254" text-anchor="middle" font-size="10" fill="#374151">校验输出</text>

  <!-- ═══════════ RAG 模块 ═══════════ -->
  <rect x="820" y="202" width="220" height="70" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="930" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">RAG 模块（默认启用）</text>
  <text x="930" y="240" text-anchor="middle" font-size="10" fill="#374151">★ HybridRagBackend</text>
  <text x="930" y="255" text-anchor="middle" font-size="10" fill="#64748B">词法 · 字段覆盖 · 元数据 三路打分</text>
  <text x="930" y="265" text-anchor="middle" font-size="10" fill="#64748B">  DefaultRagBackend（直通 no-op）</text>

  <!-- RAGAgent ↔ RAG模块 -->
  <line x1="818" y1="230" x2="820" y2="230" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-dash)"/>

  <!-- ═══════════ Skills 区 ═══════════ -->
  <rect x="20" y="296" width="980" height="30" fill="#ECFDF5" rx="4"/>
  <text x="510" y="316" text-anchor="middle" font-size="11" font-weight="bold" fill="#065F46">Agent Skill 层（LLM 增强，需配置 API Key）</text>

  <!-- Skill boxes -->
  <!-- task-understanding -->
  <rect x="20" y="332" width="175" height="52" rx="5" fill="#D1FAE5" stroke="#10B981" stroke-width="1.2"/>
  <text x="107" y="350" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">task-understanding</text>
  <text x="107" y="365" text-anchor="middle" font-size="10" fill="#374151">提取任务意图与约束</text>
  <text x="107" y="378" text-anchor="middle" font-size="10" fill="#64748B">→ MasterAgent</text>

  <!-- candidate-selection -->
  <rect x="203" y="332" width="175" height="52" rx="5" fill="#D1FAE5" stroke="#10B981" stroke-width="1.2"/>
  <text x="290" y="350" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">candidate-selection</text>
  <text x="290" y="365" text-anchor="middle" font-size="10" fill="#374151">建议性证据二次筛选</text>
  <text x="290" y="378" text-anchor="middle" font-size="10" fill="#64748B">→ RetrievalAgent</text>

  <!-- paragraph-structuring -->
  <rect x="386" y="332" width="185" height="52" rx="5" fill="#D1FAE5" stroke="#10B981" stroke-width="1.2"/>
  <text x="478" y="350" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">paragraph-structuring</text>
  <text x="478" y="365" text-anchor="middle" font-size="10" fill="#374151">docx 段落 → 候选记录</text>
  <text x="478" y="378" text-anchor="middle" font-size="10" fill="#64748B">→ CoderAgent（docx）</text>

  <!-- table-row-extraction -->
  <rect x="579" y="332" width="185" height="52" rx="5" fill="#D1FAE5" stroke="#10B981" stroke-width="1.2"/>
  <text x="671" y="350" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">table-row-extraction</text>
  <text x="671" y="365" text-anchor="middle" font-size="10" fill="#374151">xlsx 列语义映射目标字段</text>
  <text x="671" y="378" text-anchor="middle" font-size="10" fill="#64748B">→ CoderAgent（xlsx）</text>

  <!-- verification -->
  <rect x="772" y="332" width="148" height="52" rx="5" fill="#D1FAE5" stroke="#10B981" stroke-width="1.2"/>
  <text x="846" y="350" text-anchor="middle" font-size="10" font-weight="bold" fill="#065F46">verification</text>
  <text x="846" y="365" text-anchor="middle" font-size="10" fill="#374151">LLM 审核最终结果</text>
  <text x="846" y="378" text-anchor="middle" font-size="10" fill="#64748B">→ VerifierAgent</text>

  <!-- ═══════════ 输出层 ═══════════ -->
  <rect x="20" y="430" width="100" height="24" fill="#FEE2E2" rx="4"/>
  <text x="70" y="446" text-anchor="middle" font-size="11" font-weight="bold" fill="#991B1B">输 出 层</text>

  <rect x="20" y="458" width="190" height="52" rx="6" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="115" y="479" text-anchor="middle" font-size="11" font-weight="bold" fill="#BE123C">填好的表格文件</text>
  <text x="115" y="496" text-anchor="middle" font-size="10" fill="#64748B">outputs/ 目录下的 xlsx / docx</text>

  <rect x="228" y="458" width="150" height="52" rx="6" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="303" y="479" text-anchor="middle" font-size="11" font-weight="bold" fill="#BE123C">校验报告</text>
  <text x="303" y="496" text-anchor="middle" font-size="10" fill="#64748B">pass / warning / fail</text>

  <rect x="396" y="458" width="200" height="52" rx="6" fill="#FFF1F2" stroke="#F43F5E" stroke-width="1.5"/>
  <text x="496" y="479" text-anchor="middle" font-size="11" font-weight="bold" fill="#BE123C">调试轨迹（可选）</text>
  <text x="496" y="496" text-anchor="middle" font-size="10" fill="#64748B">workspace/cache/ 中间产物</text>

  <!-- Verifier → 输出 箭头 -->
  <line x1="450" y1="262" x2="450" y2="420" stroke="#64748B" stroke-width="1.5"/>
  <line x1="450" y1="420" x2="115" y2="420" stroke="#64748B" stroke-width="1.5"/>
  <line x1="115" y1="420" x2="115" y2="456" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="420" x2="303" y2="420" stroke="#64748B" stroke-width="1.5"/>
  <line x1="303" y1="420" x2="303" y2="456" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="420" x2="496" y2="420" stroke="#64748B" stroke-width="1.5"/>
  <line x1="496" y1="420" x2="496" y2="456" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>
